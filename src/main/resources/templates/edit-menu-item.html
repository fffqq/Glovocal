<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Menu Item</title>
    <style>
        body { background-color: #2c3e50; color: white; font-family: sans-serif; padding: 50px; }
        .form-container { background: #34495e; padding: 20px; border-radius: 8px; width: 300px; margin: 0 auto; }
        input { display: block; width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Edit Item</h2>
    <form th:action="@{/Admins/restaurants/edit/{rId}/menu/update/{iId}(rId=${resId}, iId=${item.id})}" method="post">
        <label>Name:</label>
        <input type="text" name="name" th:value="${item.name}" required>

        <label>Price (€):</label>
        <input type="number" step="0.01" name="price" th:value="${item.price}" required>

        <button type="submit">Update Item</button>
        <a th:href="@{/Admins/restaurants/edit/{id}(id=${resId})}" style="color: #bdc3c7; display:block; text-align:center; margin-top:10px;">Cancel</a>
    </form>
</div>
</body>
</html>
