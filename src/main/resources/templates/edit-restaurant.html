<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit User</title>
  <style>
    body { background-color: #2c3e50; color: white; font-family: sans-serif; padding: 50px; }
    .form-container { background: #34495e; padding: 20px; border-radius: 8px; width: 300px; }
    input, select { display: block; width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; cursor: pointer; }
  </style>
</head>
<body>
<div class="form-container">
  <h2>Edit Restaurant ID: <span th:text="${restaurant.id}"></span></h2>

  <form th:action="@{/Admins/restaurants/update/{id}(id=${restaurant.id})}" th:object="${restaurant}" method="post">

    <input type="hidden" th:field="*{id}">

    <label>Restaurant Name:</label>
    <input type="text" th:field="*{name}" required placeholder="Enter name">

    <label>Address:</label>
    <input type="text" th:field="*{address}" required placeholder="Enter address">

    <label>Description:</label>
    <input type="text" th:field="*{description}" placeholder="Enter description">

    <button type="submit" style="background-color: #27ae60; color: white; border: none;">Save Changes</button>

    <a href="/Admins" class="cancel-btn">Cancel</a>
  </form>
</div>
<h3>Menu:</h3>

<div style="margin-top: 30px;">
  <h3>Add New Menu Item</h3>
  <form th:action="@{/Admins/restaurants/edit/{id}/addItem(id=${restaurant.id})}" method="post">
    <input type="text" name="name" placeholder="Item Name" required>
    <input type="number" step="0.01" name="price" placeholder="Price (€)" required>
    <button type="submit" style="background-color: #27ae60; color: white; border: none; padding: 10px;">
      Add to Menu
    </button>
  </form>
</div>

<table>
  <thead>
  <tr>
    <th>Name</th>
    <th>Price(€)</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="item : ${menuItems}">
    <td th:text="${item.name}"></td>
    <td th:text="${item.price}"></td>
    <td>
      <a th:href="@{/Admins/restaurants/edit/{resId}/menu/edit/{itemId}(resId=${restaurant.id}, itemId=${item.id})}"
         style="color: #f1c40f; margin-right: 10px; text-decoration: none;">Edit</a>

      <form th:action="@{/Admins/restaurants/edit/{resId}/delete/{itemId}(resId=${restaurant.id}, itemId=${item.id})}" method="post" style="display:inline;">
        <button type="submit" class="btn-del" onclick="return confirm('Delete?')">Delete</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
