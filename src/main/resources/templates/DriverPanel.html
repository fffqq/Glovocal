<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Driver Panel</title>
</head>
<body style="background: #2c3e50; color: white; padding: 20px; font-family: Arial, sans-serif;">

<h2 style="color: white; font-family: Arial, sans-serif; border-bottom: 2px solid #e74c3c; padding-bottom: 10px;">Available for Delivery (SENT)</h2>

<table border="1" style="width: 100%; border-collapse: collapse; text-align: left; background-color: #2c3e50; color: white; font-family: Arial, sans-serif;">
    <thead>
    <tr style="background-color: #34495e;">
        <th style="padding: 10px;">ID Order</th>
        <th style="padding: 10px;">Customer Address</th>
        <th style="padding: 10px;">Price</th>
        <th style="padding: 10px; text-align: center;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${available}">
        <td style="padding: 10px;" th:text="${order.id}"></td>
        <td style="padding: 10px; color: #ffcc00; font-weight: bold;" th:text="${order.customerAddres}"></td>
        <td style="padding: 10px;" th:text="${order.totalPrice} + ' €'"></td>
        <td style="padding: 10px; text-align: center;">
            <a th:href="@{/Drivers/accept/{id}(id=${order.id})}"
               style="background: #2ecc71; color: white; padding: 5px 15px; text-decoration: none; border-radius: 3px; font-weight: bold; font-size: 0.9em;"
               onclick="return confirm('Do you want to pick up this order?')">
                PICK UP
            </a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(available)}">
        <td colspan="4" style="padding: 20px; text-align: center; color: #bdc3c7;">No orders available for delivery.</td>
    </tr>
    </tbody>
</table>

<br><br>

<h2 style="color: #bdc3c7; font-family: Arial, sans-serif;">My Completed Deliveries (History)</h2>

<table border="1" style="width: 100%; border-collapse: collapse; text-align: left; background-color: #34495e; color: #bdc3c7; font-family: Arial, sans-serif; opacity: 0.9;">
    <thead>
    <tr style="background-color: #2c3e50;">
        <th style="padding: 10px;">ID Order</th>
        <th style="padding: 10px;">Address</th>
        <th style="padding: 10px;">Status</th>
        <th style="padding: 10px;">Price</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${history}">
        <td style="padding: 10px;" th:text="${order.id}"></td>
        <td style="padding: 10px;" th:text="${order.customerAddres}"></td>
        <td style="padding: 10px; color: #2ecc71;" th:text="${order.status}"></td>
        <td style="padding: 10px;" th:text="${order.totalPrice} + ' €'"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(history)}">
        <td colspan="4" style="padding: 20px; text-align: center;">Your history is empty.</td>
    </tr>
    </tbody>
</table>

<br>
<a href="/logout" style="color: #bdc3c7; text-decoration: none; font-size: 0.8em;">Logout</a>

</body>
</html>
