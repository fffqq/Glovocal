<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <style>
        body { background-color: #2c3e50; color: white; font-family: sans-serif; padding: 50px; }
        .form-container { background: #34495e; padding: 20px; border-radius: 8px; width: 300px; }
        input, select { display: block; width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Edit User ID: <span th:text="${user.id}"></span></h2>
    <form th:action="@{/Admins/update/{id}(id=${user.id})}" th:object="${user}" method="post">

        <label>Login:</label>
        <input type="text" th:field="*{login}" required>

        <label>Email:</label>
        <input type="email" th:field="*{email}" required>

        <label>Role:</label>
        <select th:field="*{role}">
            <option value="CUSTOMER">CUSTOMER</option>
            <option value="DRIVER">DRIVER</option>
            <option value="ADMIN">ADMIN</option>
        </select>

        <button type="submit" style="background-color: #27ae60; color: white; border: none;">Save Changes</button>
        <br><br>
        <a href="/Admins" style="color: #ecf0f1; display: block; text-align: center;">Cancel</a>
    </form>
</div>
</body>
</html>
