<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <style>
        table { width: 100%; border-collapse: collapse; color: white; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
        body { background-color: #2c3e50; color: white; font-family: sans-serif; }
        .btn-del { color: #ff6b6b; }
        .btn-upd { color: #f1c40f; }
    </style>
</head>
<body>
<h2>List of Users</h2>

<div style="margin-bottom: 20px;">
    <button onclick="document.getElementById('createForm').style.display='block'">+ Create New User</button>
</div>

<div id="createForm" style="display:none; background: #34495e; padding: 15px; margin-bottom: 20px;">
    <form th:action="@{/Admins/create}" method="post">
        <input type="text" name="login" placeholder="Login" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <select name="role">
            <option value="CUSTOMER">CUSTOMER</option>
            <option value="DRIVER">DRIVER</option>
            <option value="ADMIN">ADMIN</option>
        </select>
        <button type="submit">Save</button>
        <button type="button" onclick="this.parentElement.parentElement.style.display='none'">Cancel</button>
    </form>
</div>

<table>
    <thead>
    <tr>

        <th>ID</th>
        <th>Login</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="customer : ${allCustomers}">
        <td th:text="${customer.id}"></td>
        <td th:text="${customer.login}"></td>
        <td th:text="${customer.email}"></td>
        <td>
            <form th:action="@{/Admins/update-role/{id}(id=${customer.id})}" method="post">
                <select name="role" onchange="this.form.submit()">
                    <option th:value="CUSTOMER" th:selected="${customer.role == 'CUSTOMER'}">CUSTOMER</option>
                    <option th:value="DRIVER" th:selected="${customer.role == 'DRIVER'}">DRIVER</option>
                    <option th:value="ADMIN" th:selected="${customer.role == 'ADMIN'}">ADMIN</option>
                </select>
            </form>
        </td>
        <td>
            <form th:action="@{/Admins/delete/{id}(id=${customer.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn-del" onclick="return confirm('Delete?')">Delete</button>
                <a th:href="@{/Admins/edit/{id}(id=${customer.id})}" class="btn-upd">Edit</a>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<h2>List of Restaurants</h2>

<div style="margin-bottom: 20px;">
    <button onclick="document.getElementById('createResForm').style.display='block'">+ Add New Restaurant</button>
</div>
<div id="createResForm" style="display:none; background: #34495e; padding: 15px; margin-bottom: 20px; border-radius: 5px;">
    <form th:action="@{/Admins/restaurants/create}" method="post">
        <input type="text" name="name" placeholder="Restaurant Name" required style="margin-right: 5px;">
        <input type="text" name="address" placeholder="Address" required style="margin-right: 5px;">
        <input type="text" name="description" placeholder="Description" style="margin-right: 5px;">

        <button type="submit">Save</button>
        <button type="button" onclick="this.parentElement.parentElement.style.display='none'">Cancel</button>
    </form>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Address</th>
        <th>Description</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="res : ${allRestaurants}">
        <td th:text="${res.id}"></td>
        <td th:text="${res.name}"></td>
        <td th:text="${res.address}"></td>
        <td th:text="${res.description}"></td>
        <td>
            <form th:action="@{/Admins/restaurants/delete/{id}(id=${res.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn-del" onclick="return confirm('Delete restaurant?')">Delete</button>
                <a th:href="@{/Admins/restaurants/edit/{id}(id=${res.id})}" class="btn-upd">Edit</a>
            </form>
        </td>
    </tr>
    </tbody>
</table>


<div style="margin-top: 50px; padding: 20px; background-color: #34495e; border-radius: 10px; font-family: Arial, sans-serif;">
    <h2 style="color: #ecf0f1; border-bottom: 2px solid #e74c3c; padding-bottom: 10px;">Global Orders Management (Admin)</h2>

    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left; color: white; margin-top: 20px;">
        <thead>
        <tr style="background-color: #2c3e50;">
            <th style="padding: 12px;">ID</th>
            <th style="padding: 12px;">Customer ID</th>
            <th style="padding: 12px;">Restaurant</th>
            <th style="padding: 12px;">Status</th>
            <th style="padding: 12px;">Total Price</th>
            <th style="padding: 12px; text-align: center;">Control</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td style="padding: 10px; border-bottom: 1px solid #455a64;" th:text="${order.id}"></td>
            <td style="padding: 10px; border-bottom: 1px solid #455a64;" th:text="${order.customerId}"></td>
            <td style="padding: 10px; border-bottom: 1px solid #455a64; color: #ffcc00;" th:text="${order.restaurantName}"></td>
            <td style="padding: 10px; border-bottom: 1px solid #455a64;">
                    <span th:text="${order.status}"
                          th:style="${order.status == 'DELIVERED' ? 'color: #2ecc71' : 'color: #3498db'}"></span>
            </td>
            <td style="padding: 10px; border-bottom: 1px solid #455a64;" th:text="${order.totalPrice} + ' €'"></td>

            <td style="padding: 10px; border-bottom: 1px solid #455a64; text-align: center;">
                <a th:href="@{/my-orders/edit/{id}(id=${order.id})}"
                   style="color: #3498db; text-decoration: none; margin-right: 15px; font-weight: bold;">EDIT</a>

                <a th:href="@{/Admins/orders/delete/{id}(id=${order.id})}"
                   style="color: #e74c3c; text-decoration: none; font-weight: bold;"
                   onclick="return confirm('WARNING: Are you sure you want to PERMANENTLY delete this order?')">
                    DELETE
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
