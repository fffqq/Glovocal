<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${order.status == 'DELIVERED' ? 'View Order' : 'Edit Order'}">Order</title>
</head>
<body style="background: #2c3e50; color: white; padding: 20px; font-family: Arial, sans-serif;">

<h2 th:if="${order.status != 'DELIVERED'}">Edit Order #<span th:text="${order.id}"></span></h2>
<h2 th:if="${order.status == 'DELIVERED'}">Order Summary #<span th:text="${order.id}"></span></h2>

<form th:if="${order.status != 'DELIVERED'}" th:action="@{/my-orders/update}" th:object="${order}" method="post" style="background: #34495e; padding: 20px; border-radius: 8px;">
    <input type="hidden" th:field="*{id}">
    <input type="hidden" th:field="*{customerId}">
    <input type="hidden" th:field="*{restaurantId}">

    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">Order Status:</label>
        <select th:field="*{status}" style="padding: 8px; border-radius: 4px; border: none; width: 200px;">
            <option value="SENT">SENT</option>
            <option value="DELIVERED">DELIVERED</option>
        </select>
    </div>

    <p>Total Price: <b><span th:text="${order.totalPrice != null ? order.totalPrice : '0.0'}"></span> €</b></p>

    <button type="submit" style="background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
        Save Changes
    </button>
</form>

<div th:if="${order.status == 'DELIVERED'}" style="background: #34495e; padding: 20px; border-radius: 8px;">
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; color: #bdc3c7;">Order Status:</label>
        <b style="font-size: 1.2em; color: #2ecc71;">DELIVERED</b>
    </div>

    <p>Total Price: <b><span th:text="${order.totalPrice != null ? order.totalPrice : '0.0'}"></span> €</b></p>

    <a href="/my-orders" style="display: inline-block; background: #7f8c8d; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold;">
        Back to Order List
    </a>
</div>

<h3 style="margin-top: 30px;">Order Items:</h3>
<table border="1" style="width: 100%; border-collapse: collapse; background: #34495e; border-color: #455a64;">
    <thead>
    <tr style="background-color: #2c3e50;">
        <th style="padding: 12px; text-align: left;">Item Name</th>
        <th style="padding: 12px; text-align: center;">Qty</th>
        <th style="padding: 12px; text-align: left;">Price (each)</th>
        <th th:if="${order.status != 'DELIVERED'}" style="padding: 12px; text-align: center;">Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td style="padding: 10px; border: 1px solid #455a64;" th:text="${item.itemName}"></td>
        <td style="padding: 10px; border: 1px solid #455a64; text-align: center;" th:text="${item.quantity}"></td>
        <td style="padding: 10px; border: 1px solid #455a64;" th:text="${item.price} + ' €'"></td>

        <td th:if="${order.status != 'DELIVERED'}" style="padding: 10px; border: 1px solid #455a64; text-align: center;">
            <a th:href="@{/my-orders/item/decrease/{itemId}(itemId=${item.id})}"
               style="color: #e74c3c; text-decoration: none; font-weight: bold; border: 1px solid #e74c3c; padding: 2px 8px; border-radius: 4px; font-size: 0.9em;"
               onclick="return confirm('Reduce quantity by 1?')">
                - 1
            </a>
        </td>
    </tr>
    </tbody>
</table>

<br>
<a href="/my-orders" style="color: #bdc3c7; text-decoration: none; font-size: 0.9em;">Back to Order List</a>
</body>
</html>
