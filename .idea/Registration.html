<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Glovo-reg</title>
    <style>

        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }


        .Title_name {
            font-size: 48px !important;
            font-weight: bold;
            margin-bottom: 40px;
        }


        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .input-group input {
            padding: 12px;
            width: 300px;
            font-size: 18px;
            border-radius: 5px;
            border: none;
        }

        .input-group label {
            font-size: 18px;
            margin-bottom: -5px;
        }


        .Reg_Aut_butt_container {
            margin-top: 30px;
        }

        .Reg_Aut_buttons button {
            padding: 15px 40px;
            background: darkcyan;
            border: none;
            color: antiquewhite;
            font-size: 20px;
            cursor: pointer;
            border-radius: 8px;
        }

        .Reg_Aut_buttons button:hover {
            background: #006b6b;
        }
    </style>
</head>
<body>
<p class="Title_name">Glovocall</p>


<div class="input-group">
    <label for="loginInput">Login:</label>
    <input type="text" id="loginInput" >

    <label for="passInput">Password:</label>
    <input type="password" id="passInput" >

    <label for="emailInput">Email:</label>
    <input type="email" id="emailInput" >
</div>
<div class="Reg_Aut_butt_container">
    <div class="Reg_Aut_buttons">
        <button class="Reg_Aut_buttons" onclick="RegToAPI()">Registration</button>
    </div>
</div>
<script>

    const Customer={
        login:"",
        email:"",
        password:"",
    }

    async function RegToAPI(){
        Customer.login=document.getElementById("loginInput").value;
        Customer.password=document.getElementById("passInput").value;
        Customer.email=document.getElementById("emailInput").value;
        await fetchGlovoToApiReg();

    }

</script>
<script src="DataToApi.js"></script>
</body>
</html>
